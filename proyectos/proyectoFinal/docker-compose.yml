version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: techshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: techshop
      MYSQL_USER: techshop_user
      MYSQL_PASSWORD: techshop_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: techshop-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: techshop
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    restart: unless-stopped

  app:
    build: ./techshop
    container_name: techshop-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techshop
      SPRING_DATASOURCE_USERNAME: techshop_user
      SPRING_DATASOURCE_PASSWORD: techshop_pass
      SPRING_DATA_MONGODB_URI: mongodb://techshop_user:techshop_pass@mongodb:27017/techshop
    depends_on:
      - mysql
      - mongodb
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
